{% extends 'base.html' %}
{% block title %}Create Assignment - {{ course.title }}{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('courses_list') }}">Courses</a>
    <span class="breadcrumb-sep">›</span>
    <a href="{{ url_for('course_detail', course_id=course.id) }}">{{ course.title }}</a>
    <span class="breadcrumb-sep">›</span>
    <span>Create Assignment</span>
</div>

<div class="page-header">
    <h1>📝 Create New Assignment</h1>
    <p>Set up a submission space for students</p>
</div>

<div class="card" style="max-width: 700px;">
    <form method="POST">
        <div class="form-group">
            <label class="form-label" for="title">Assignment Title *</label>
            <input type="text" id="title" name="title" class="form-input" placeholder="e.g., Coursework 1: Python Basics" required>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="description">Instructions / Description</label>
            <textarea id="description" name="description" class="form-textarea" rows="5" placeholder="Upload your solution in PDF format..."></textarea>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="due_date">Due Date</label>
                <input type="datetime-local" id="due_date" name="due_date" class="form-input">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="max_marks">Max Marks</label>
                <input type="number" id="max_marks" name="max_marks" class="form-input" value="100">
            </div>
        </div>
        
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">Create Submission Space</button>
            <a href="{{ url_for('course_detail', course_id=course.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
